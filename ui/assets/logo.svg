  <!-- 刘海 -->
  <path d="M35 30 Q40 38 45 32 Q50 38 55 32 Q60 38 65 30" fill="#0d0d0d"/>
  
  <!-- 脸部 -->
  <ellipse cx="50" cy="48" rx="18" ry="20" fill="#ffe4d6"/>
  
  <!-- 眼睛（动漫风格大眼睛） -->
  <ellipse cx="42" cy="45" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="58" cy="45" rx="5" ry="6" fill="#1a1a2e"/>
  <circle cx="43" cy="43" r="2" fill="#ffffff"/>
  <circle cx="59" cy="43" r="2" fill="#ffffff"/>
  <circle cx="41" cy="47" r="1" fill="#ffffff"/>
  <circle cx="57" cy="47" r="1" fill="#ffffff"/>
  
  <!-- 眉毛 -->
  <path d="M38 38 Q42 36 46 38" stroke="#0d0d0d" stroke-width="1.5" fill="none"/>
  <path d="M54 38 Q58 36 62 38" stroke="#0d0d0d" stroke-width="1.5" fill="none"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="52" r="1" fill="#e8c4b8"/>
  
  <!-- 嘴巴（微笑） -->
  <path d="M46 58 Q50 62 54 58" stroke="#d4a574" stroke-width="1.5" fill="none"/>
  
  <!-- 腮红 -->
  <ellipse cx="38" cy="52" rx="3" ry="2" fill="#ffb6c1" opacity="0.6"/>
  <ellipse cx="62" cy="52" rx="3" ry="2" fill="#ffb6c1" opacity="0.6"/>
  
  <!-- 发饰（红色蝴蝶结） -->
  <path d="M50 22 L45 18 L45 26 Z" fill="#e94560"/>
  <path d="M50 22 L55 18 L55 26 Z" fill="#e94560"/>
  <circle cx="50" cy="22" r="3" fill="#ff6b6b"/>
  
